name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pnpm
        uses: pnpm/action-setup@v4

      - name: Prepare Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

  upstream-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pnpm
        uses: pnpm/action-setup@v4

      - name: Prepare Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Clone upstream nikic/PHP-Parser
        run: git clone --depth 1 https://github.com/nikic/PHP-Parser.git /tmp/upstream-php-parser

      - name: Run tests (including upstream compatibility)
        run: pnpm run test

  check-beachball-changefile:
    if: github.base_ref == github.event.repository.default_branch
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install

      - name: Check
        run: pnpm exec beachball check

  build:
    if: ${{ always() && !failure() && !cancelled() }}
    needs: [lint-and-test, check-beachball-changefile]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish (development)
        if: github.repository == 'RightCapitalHQ/php-parser' && github.base_ref == github.event.repository.default_branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          preid="${HEAD_REF//\//-}".${{ github.run_number }}.${{ github.run_attempt }}
          npm --no-git-tag-version version prerelease --preid="${preid}"
          pnpm publish --no-git-checks --access public --tag development

      - name: Publish (main)
        if: github.repository == 'RightCapitalHQ/php-parser' && github.ref_name == github.event.repository.default_branch
        run: |
          git config --local user.email "npm-publisher@rightcapital.com"
          git config --local user.name "GitHub Actions[bot]"
          pnpm beachball publish --access public --yes -m 'chore(release): applying package updates'
